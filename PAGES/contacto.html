<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactame</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="icon" href="../IMG/DAX-Rap-God.jpg" type="image">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <nav>
            <ul class="menu">
                <li>
                    <a class="btn" href="../index.html" alt="Enlace a la página de inicio">
                        <span class="link-icon">🏠</span>
                        <span class="link-title">Inicio</span>
                    </a>
                </li>
                <li>
                    <a class="btn" href="./calendario.html" alt="Enlace a la página de calendario de conciertos">
                        <span class="link-icon">🗓️</span>
                        <span class="link-title">Calendario</span>
                    </a>
                </li>
                <li>
                    <a class="btn" href="./galeria.html" alt="Enlace a la galería de fotos">
                        <span class="link-icon">🖼️</span>
                        <span class="link-title">Galería</span>
                    </a>
                </li>
                <li>
                    <a class="btn" href="./discografica.html" alt="Enlace a la página de discografía">
                        <span class="link-icon">🎸</span>
                        <span class="link-title">Discográfica</span>
                    </a>
                </li>
                <li>
                    <a class="btn" href="./contacto.html" alt="Enlace a la página de contacto">
                        <span class="link-icon" aria-hidden="true">✉️</span>
                        <span class="link-title">Contacto</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="content">
        <div class="form-center-container">
            <div class="form-container">
                <h1>Como podemos ayudarte?</h1>
                <form class="form" aria-label="Formulario de contacto para enviar un mensaje a DAX">
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" required
                            aria-label="Campo para ingresar tu correo electrónico">
                    </div>
                    <div class="form-group">
                        <label for="textarea">¿Con qué te ayudamos?</label>
                        <textarea name="textarea" id="textarea" rows="10" cols="50" required
                            aria-label="Campo para escribir tu mensaje o consulta"></textarea>
                    </div>
                    <button class="form-submit-btn" type="submit" aria-label="Enviar mensaje">Enviar</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="social-links">
                <a href="https://www.instagram.com/thatsdax/" target="_blank" class="social-link instagram"
                    alt="Enlace externo al Instagram oficial de DAX">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://www.youtube.com/@Thatsdax" target="_blank" class="social-link youtube"
                    alt="Enlace externo al canal de YouTube de DAX">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
                <a href="https://open.spotify.com/intl-es/artist/5icKdCmMhNMYoAzVBAWt39?si=tfSgJj96ROKShAUl1kWKbA"
                    target="_blank" class="social-link spotify" alt="Enlace externo al perfil de Spotify de DAX">
                    <i class="fab fa-spotify"></i> Spotify
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
